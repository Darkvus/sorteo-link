<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#070710"/>
    </linearGradient>
    <filter id="gy"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gc"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="none" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Coin -->
  <circle cx="32" cy="30" r="19" fill="#ffe600" filter="url(#gy)"/>
  <circle cx="32" cy="30" r="17" fill="#ffd000"/>
  <circle cx="32" cy="30" r="15" fill="#ffb800"/>
  <circle cx="32" cy="30" r="19" fill="none" stroke="#b8860b" stroke-width="2"/>
  <circle cx="32" cy="30" r="14" fill="none" stroke="#b8860b" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Lucky 7 pixel -->
  <rect x="24" y="21" width="16" height="3" fill="#7a5800"/>
  <rect x="34" y="24" width="3" height="5" fill="#7a5800"/>
  <rect x="31" y="29" width="3" height="5" fill="#7a5800"/>
  <rect x="27" y="34" width="4" height="4" fill="#7a5800"/>
  <!-- Shine -->
  <ellipse cx="26" cy="23" rx="5" ry="2.5" fill="#fff" fill-opacity="0.3" transform="rotate(-30 26 23)"/>
  <!-- Coin slot -->
  <rect x="20" y="52" width="24" height="4" rx="1" fill="#0a0a1a" stroke="#00f5ff" stroke-width="1.5" filter="url(#gc)"/>
  <rect x="24" y="53.5" width="16" height="1" fill="#00f5ff" fill-opacity="0.5"/>
  <!-- Corner accents -->
  <rect x="4"  y="4"  width="6" height="2" fill="#00f5ff" fill-opacity="0.7"/>
  <rect x="4"  y="4"  width="2" height="6" fill="#00f5ff" fill-opacity="0.7"/>
  <rect x="54" y="4"  width="6" height="2" fill="#00f5ff" fill-opacity="0.7"/>
  <rect x="58" y="4"  width="2" height="6" fill="#00f5ff" fill-opacity="0.7"/>
  <rect x="4"  y="58" width="6" height="2" fill="#00f5ff" fill-opacity="0.7"/>
  <rect x="4"  y="56" width="2" height="6" fill="#00f5ff" fill-opacity="0.7"/>
  <rect x="54" y="58" width="6" height="2" fill="#00f5ff" fill-opacity="0.7"/>
  <rect x="58" y="56" width="2" height="6" fill="#00f5ff" fill-opacity="0.7"/>
</svg>
